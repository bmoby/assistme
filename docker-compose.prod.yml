# Production deployment — Docker Compose
# Embeddings: OpenAI text-embedding-3-small API (no self-hosted server needed)
# Services: redis, bot-discord, bot-discord-quiz
services:
  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # bot-telegram: DISABLED — no longer needed (admin notifications handled in Discord #admin)
  # bot-telegram-public: DISABLED — no longer needed

  bot-discord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-bot-discord
    command: node packages/bot-discord/dist/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot-discord-quiz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-bot-discord-quiz
    command: node packages/bot-discord-quiz/dist/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  seed-knowledge:
    build:
      context: .
      dockerfile: Dockerfile
      target: seed
    container_name: vibe-seed-knowledge
    env_file: .env
    environment:
      - NODE_ENV=production
    profiles:
      - seed

volumes:
  redis-data:
