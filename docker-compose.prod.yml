services:
  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  embedding-server:
    build:
      context: ./embedding-server
      dockerfile: Dockerfile
    container_name: vibe-embedding-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  bot-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-bot-telegram
    command: node packages/bot-telegram/dist/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - EMBEDDING_SERVER_URL=http://embedding-server:8090/embed
    depends_on:
      - redis
      - embedding-server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot-telegram-public:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-bot-telegram-public
    command: node packages/bot-telegram-public/dist/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - EMBEDDING_SERVER_URL=http://embedding-server:8090/embed
    depends_on:
      - redis
      - embedding-server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot-discord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-bot-discord
    command: node packages/bot-discord/dist/index.js
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - EMBEDDING_SERVER_URL=http://embedding-server:8090/embed
    depends_on:
      - redis
      - embedding-server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
