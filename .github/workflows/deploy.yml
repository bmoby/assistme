name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bot-discord: ${{ steps.changes.outputs.bot-discord }}
      bot-discord-quiz: ${{ steps.changes.outputs.bot-discord-quiz }}
      knowledge: ${{ steps.changes.outputs.knowledge }}
      migrations: ${{ steps.changes.outputs.migrations }}
      infra: ${{ steps.changes.outputs.infra }}
      anything: ${{ steps.anything.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            bot-discord:
              - 'packages/bot-discord/**'
              - 'packages/core/**'
            bot-discord-quiz:
              - 'packages/bot-discord-quiz/**'
              - 'packages/core/**'
            knowledge:
              - 'learning-knowledge/**'
              - 'scripts/seed-formation-knowledge.ts'
            migrations:
              - 'supabase/migrations/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'Dockerfile'
              - '.github/workflows/deploy.yml'

      # Simple flag: did anything deployable change?
      - id: anything
        run: |
          if [[ \
            "${{ steps.changes.outputs.bot-discord }}" == "true" || \
            "${{ steps.changes.outputs.bot-discord-quiz }}" == "true" || \
            "${{ steps.changes.outputs.knowledge }}" == "true" || \
            "${{ steps.changes.outputs.migrations }}" == "true" || \
            "${{ steps.changes.outputs.infra }}" == "true" \
          ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  # Run migrations BEFORE deploying services
  migrate:
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pending migrations
        run: |
          # Create tracking table + seed legacy migrations as already applied
          psql "${{ secrets.SUPABASE_DB_URL }}" -c "
            CREATE TABLE IF NOT EXISTS _migrations (
              version TEXT PRIMARY KEY,
              applied_at TIMESTAMPTZ DEFAULT NOW()
            );
            INSERT INTO _migrations (version) VALUES
              ('001_initial_schema'),
              ('002_memory_and_events'),
              ('003_public_knowledge'),
              ('004_students_system'),
              ('005_sessions_system')
            ON CONFLICT DO NOTHING;
          "

          # Apply each migration file in order, skip already applied
          for f in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$f" .sql)
            already=$(psql "${{ secrets.SUPABASE_DB_URL }}" -t -c "SELECT 1 FROM _migrations WHERE version = '$version'" | tr -d ' ')
            if [ "$already" = "1" ]; then
              echo "Skipping $version (already applied)"
            else
              echo "Applying $version..."
              psql "${{ secrets.SUPABASE_DB_URL }}" -f "$f"
              psql "${{ secrets.SUPABASE_DB_URL }}" -c "INSERT INTO _migrations (version) VALUES ('$version')"
              echo "$version applied successfully"
            fi
          done

  # Deploy services to VPS
  deploy:
    needs: [detect-changes, migrate]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      needs.detect-changes.outputs.anything == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync .env to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > /opt/assistme/.env << 'ENVEOF'
            ${{ secrets.DOTENV_FILE }}
            ENVEOF
            echo ".env synced from GitHub Secrets"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/assistme

            # Pull latest code
            git pull origin main

            # Always ensure infra services are running
            docker compose -f docker-compose.prod.yml up -d redis

            # Stop disabled telegram bots if still running
            docker compose -f docker-compose.prod.yml rm -sf bot-telegram bot-telegram-public 2>/dev/null || true

            # Determine which bot services to rebuild
            SERVICES=""

            # If migrations or infra changed, rebuild all active bots
            if [ "${{ needs.detect-changes.outputs.migrations }}" == "true" ] || \
               [ "${{ needs.detect-changes.outputs.infra }}" == "true" ]; then
              SERVICES="bot-discord bot-discord-quiz"
            else
              if [ "${{ needs.detect-changes.outputs.bot-discord }}" == "true" ]; then
                SERVICES="$SERVICES bot-discord"
              fi
              if [ "${{ needs.detect-changes.outputs.bot-discord-quiz }}" == "true" ]; then
                SERVICES="$SERVICES bot-discord-quiz"
              fi
            fi

            if [ -n "$SERVICES" ]; then
              echo "Rebuilding:$SERVICES"
              docker compose -f docker-compose.prod.yml build $SERVICES
              docker compose -f docker-compose.prod.yml up -d $SERVICES
            fi

            # Re-seed knowledge base if content changed
            if [ "${{ needs.detect-changes.outputs.knowledge }}" == "true" ]; then
              echo "Knowledge content changed — re-seeding..."
              docker compose -f docker-compose.prod.yml build seed-knowledge
              docker compose -f docker-compose.prod.yml run --rm seed-knowledge
              echo "Knowledge seed complete"
            fi

            docker image prune -f
            echo "Deploy complete!"
