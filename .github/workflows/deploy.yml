name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bot-telegram: ${{ steps.changes.outputs.bot-telegram }}
      bot-telegram-public: ${{ steps.changes.outputs.bot-telegram-public }}
      bot-discord: ${{ steps.changes.outputs.bot-discord }}
      core: ${{ steps.changes.outputs.core }}
      embedding-server: ${{ steps.changes.outputs.embedding-server }}
      migrations: ${{ steps.changes.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            core:
              - 'packages/core/**'
            bot-telegram:
              - 'packages/bot-telegram/**'
              - 'packages/core/**'
            bot-telegram-public:
              - 'packages/bot-telegram-public/**'
              - 'packages/core/**'
            bot-discord:
              - 'packages/bot-discord/**'
              - 'packages/core/**'
            embedding-server:
              - 'embedding-server/**'
            migrations:
              - 'supabase/migrations/**'

  # Run migrations BEFORE deploying services
  migrate:
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Mark legacy migrations as applied
        run: |
          supabase migration repair --status applied 001_initial_schema --db-url "${{ secrets.SUPABASE_DB_URL }}"
          supabase migration repair --status applied 002_memory_and_events --db-url "${{ secrets.SUPABASE_DB_URL }}"
          supabase migration repair --status applied 003_public_knowledge --db-url "${{ secrets.SUPABASE_DB_URL }}"
          supabase migration repair --status applied 004_students_system --db-url "${{ secrets.SUPABASE_DB_URL }}"
          supabase migration repair --status applied 005_sessions_system --db-url "${{ secrets.SUPABASE_DB_URL }}"

      - name: Push new migrations to Supabase
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  deploy:
    needs: [detect-changes, migrate]
    # Run deploy if any service changed, even if migrate was skipped
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      (
        needs.detect-changes.outputs.bot-telegram == 'true' ||
        needs.detect-changes.outputs.bot-telegram-public == 'true' ||
        needs.detect-changes.outputs.bot-discord == 'true' ||
        needs.detect-changes.outputs.embedding-server == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/vibe-coder

            # Pull latest code
            git pull origin main

            # Always ensure infra services are running
            docker compose -f docker-compose.prod.yml up -d redis embedding-server

            # Determine which bot services to rebuild
            SERVICES=""

            if [ "${{ needs.detect-changes.outputs.bot-telegram }}" == "true" ]; then
              SERVICES="$SERVICES bot-telegram"
            fi
            if [ "${{ needs.detect-changes.outputs.bot-telegram-public }}" == "true" ]; then
              SERVICES="$SERVICES bot-telegram-public"
            fi
            if [ "${{ needs.detect-changes.outputs.bot-discord }}" == "true" ]; then
              SERVICES="$SERVICES bot-discord"
            fi

            # Rebuild embedding server if changed
            if [ "${{ needs.detect-changes.outputs.embedding-server }}" == "true" ]; then
              echo "Rebuilding embedding server"
              docker compose -f docker-compose.prod.yml build embedding-server
              docker compose -f docker-compose.prod.yml up -d embedding-server
            fi

            if [ -n "$SERVICES" ]; then
              echo "Rebuilding:$SERVICES"
              docker compose -f docker-compose.prod.yml build $SERVICES
              docker compose -f docker-compose.prod.yml up -d $SERVICES
            fi

            docker image prune -f
            echo "Deploy complete!"
