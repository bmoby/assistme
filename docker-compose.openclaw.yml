services:
  # === Infrastructure (inchangee) ===
  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  embedding-server:
    build:
      context: ./embedding-server
      dockerfile: Dockerfile
    container_name: vibe-embedding-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # === OpenClaw Gateway (remplace les 3 bots) ===
  openclaw-gateway:
    image: node:22-bookworm-slim
    container_name: openclaw-gateway
    working_dir: /app
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      - HOME=/home/node
    volumes:
      - ./openclaw:/home/node/.openclaw
    command: >
      sh -c "
        npm install -g openclaw@latest &&
        cd /home/node/.openclaw/extensions/supabase-tools && npm install --omit=dev &&
        openclaw gateway run --port 18789 --bind loopback --force
      "
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
